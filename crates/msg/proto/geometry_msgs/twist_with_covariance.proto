syntax = "proto3";

package zos.geometry;

import "geometry_msgs/twist.proto";

// Velocity in free space with uncertainty.
message TwistWithCovariance {
  Twist twist = 1;

  // Row-major 6x6 covariance matrix (length 36).
  // Orientation uses fixed-axis representation; parameters in order:
  // x, y, z, rotation about X, rotation about Y, rotation about Z.
  repeated double covariance = 2;
}
