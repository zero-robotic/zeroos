syntax = "proto3";

package zos.sensor;

import "sensor_msgs/point_field.proto";
import "std_msgs/header.proto";

// Collection of N-dimensional points with optional channels (normals, intensity, etc.).
//
// Point data is stored as a binary blob; layout is described by fields.
// Clouds may be organized 2D (image-like) or 1D (unordered). For unordered
// clouds, height is 1 and width is the point count.
message PointCloud2 {
  zos.std.Header header = 1;

  uint32 height = 2;
  uint32 width = 3;

  repeated PointField fields = 4;

  bool is_bigendian = 5; // True if multi-byte fields are big-endian.
  uint32 point_step = 6; // Length of a point in bytes.
  uint32 row_step = 7;   // Length of a row in bytes.
  bytes data = 8;        // Point data; size is row_step * height.

  bool is_dense = 9; // True if there are no invalid points.
}
