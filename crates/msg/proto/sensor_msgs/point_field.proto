syntax = "proto3";

package zos.sensor;

// Description of one point entry in a PointCloud2.
message PointField {
  enum DataType {
    DATA_TYPE_UNSPECIFIED = 0;
    INT8 = 1;
    UINT8 = 2;
    INT16 = 3;
    UINT16 = 4;
    INT32 = 5;
    UINT32 = 6;
    FLOAT32 = 7;
    FLOAT64 = 8;
    INT64 = 9;
    UINT64 = 10;
    BOOL = 11;
  }

  // Common names: x, y, z, intensity, rgb, rgba.
  string name = 1;
  uint32 offset = 2;   // Offset from start of point struct.
  DataType datatype = 3;
  uint32 count = 4;    // Number of elements in the field.
}
