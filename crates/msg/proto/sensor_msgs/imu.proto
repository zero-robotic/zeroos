syntax = "proto3";

package zos.sensor;

import "geometry_msgs/quaternion.proto";
import "geometry_msgs/vector3.proto";
import "std_msgs/header.proto";

// Data from an IMU (Inertial Measurement Unit).
//
// Linear acceleration is in m/s^2 (not g). Angular velocity is in rad/s.
//
// If measurement covariance is known, fill it in. If only per-axis variance is
// known (e.g. from a datasheet), put those values on the diagonal. An all-zero
// covariance means "unknown"; consumers must assume or obtain covariance elsewhere.
//
// If a quantity is not estimated (e.g. no orientation output), set element 0 of
// the associated covariance to -1. Consumers should check for -1 in element 0 and
// ignore the corresponding estimate.
message Imu {
  zos.std.Header header = 1;

  // Estimated orientation; row-major 3x3 covariance about x, y, z axes (length 9).
  zos.geometry.Quaternion orientation = 2;
  repeated double orientation_covariance = 3;

  // Angular velocity; row-major 3x3 covariance about x, y, z axes (length 9).
  zos.geometry.Vector3 angular_velocity = 4;
  repeated double angular_velocity_covariance = 5;

  // Linear acceleration; row-major 3x3 covariance about x, y, z axes (length 9).
  zos.geometry.Vector3 linear_acceleration = 6;
  repeated double linear_acceleration_covariance = 7;
}
